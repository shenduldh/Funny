<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爬梯子决策器 - 专业版</title>
    <script src="./assets/vue.global.js"></script>
    <script src="./assets/tailwindcss.js"></script>
    <style>
        /* 路径绘制动画 */
        .path-line {
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
            animation: draw 2s forwards cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        @keyframes draw {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* 列表过渡动画 */
        .list-enter-active,
        .list-leave-active {
            transition: all 0.3s ease;
        }

        .list-enter-from,
        .list-leave-to {
            opacity: 0;
            transform: translateX(-20px);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen text-slate-900">
    <div id="app" class="max-w-6xl mx-auto p-4 md:p-10">

        <div class="text-center mb-10">
            <h1 class="text-4xl font-black tracking-tight text-slate-800 flex justify-center items-center gap-3">
                <span class="text-5xl">🪜</span> 爬梯子决策
            </h1>
            <p class="text-slate-500 mt-2">公平、透明、有趣的随机决策工具</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-bold flex items-center gap-2">
                        <span
                            class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-sm">01</span>
                        玩家名单 (可拖拽排序)
                    </h2>
                </div>

                <div class="flex gap-2 mb-4">
                    <input v-model="inputPlayer" @keyup.enter="addPlayer" type="text" placeholder="输入玩家名字..."
                        class="flex-1 px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    <button @click="addPlayer"
                        class="bg-indigo-600 text-white px-5 py-2 rounded-xl hover:bg-indigo-700 font-bold transition-all">添加</button>
                </div>

                <div class="space-y-2 max-h-60 overflow-y-auto no-scrollbar">
                    <transition-group name="list">
                        <div v-for="(p, index) in players" :key="p.id" draggable="true" @dragstart="dragIdx = index"
                            @dragover.prevent @drop="handleDrop(index)"
                            class="flex items-center gap-3 p-3 bg-slate-50 border border-transparent hover:border-indigo-200 rounded-xl cursor-move group">
                            <span class="text-slate-300 group-hover:text-indigo-400">☰</span>
                            <input v-model="p.name"
                                class="bg-transparent font-medium flex-1 outline-none focus:text-indigo-600">
                            <button @click="removePlayer(index)"
                                class="text-slate-300 hover:text-red-500 transition-colors">✕</button>
                        </div>
                    </transition-group>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold flex items-center gap-2 mb-4">
                    <span
                        class="w-8 h-8 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-sm">02</span>
                    结果内容 (对应出口位置)
                </h2>
                <div class="space-y-2 max-h-[308px] overflow-y-auto no-scrollbar">
                    <div v-for="(res, index) in results" :key="index"
                        class="flex items-center gap-3 p-3 bg-emerald-50/50 rounded-xl border border-emerald-100">
                        <span
                            class="text-xs font-bold text-emerald-600 bg-white w-6 h-6 rounded-full flex items-center justify-center shadow-sm">{{
                            index + 1 }}</span>
                        <input v-model="results[index]" placeholder="输入结果内容..."
                            class="bg-transparent flex-1 outline-none text-slate-700 placeholder:text-slate-300 focus:text-emerald-700">
                    </div>
                    <div v-if="results.length === 0" class="text-center py-10 text-slate-400 text-sm">请先添加玩家</div>
                </div>
            </div>
        </div>

        <div class="flex justify-center mb-12">
            <button @click="generateLadder" :disabled="players.length < 2"
                class="px-12 py-4 bg-slate-900 text-white rounded-2xl font-black text-xl shadow-2xl hover:bg-black hover:scale-105 active:scale-95 disabled:opacity-30 disabled:hover:scale-100 transition-all">
                生成梯子 ⚡️
            </button>
        </div>

        <transition name="list">
            <div v-if="showLadder"
                class="bg-white rounded-[2rem] shadow-2xl p-10 border border-slate-100 overflow-x-auto no-scrollbar">
                <div class="mx-auto relative" :style="{ width: ladderWidth + 'px' }">

                    <div class="flex justify-between mb-8">
                        <div v-for="(p, idx) in players" :key="'btn-'+p.id" class="w-24 flex justify-center">
                            <button @click="startAnimation(idx)"
                                :class="['w-full py-3 px-2 rounded-2xl font-black text-sm transition-all transform shadow-sm', 
                                            activeStartIdx === idx ? 'bg-indigo-600 text-white -translate-y-2 ring-8 ring-indigo-50' : 'bg-slate-100 text-slate-600 hover:bg-slate-200']">
                                {{ p.name }}
                            </button>
                        </div>
                    </div>

                    <div class="relative">
                        <svg :width="ladderWidth" :height="ladderHeight" class="overflow-visible">
                            <line v-for="i in players.length" :x1="getX(i-1)" y1="0" :x2="getX(i-1)" :y2="ladderHeight"
                                stroke="#F1F5F9" stroke-width="8" stroke-linecap="round" />

                            <line v-for="rung in rungs" :x1="getX(rung.from)" :y1="getY(rung.level)" :x2="getX(rung.to)"
                                :y2="getY(rung.level)" stroke="#F1F5F9" stroke-width="8" stroke-linecap="round" />

                            <path v-if="activePath" :d="activePath" fill="none" stroke="#4F46E5" stroke-width="8"
                                stroke-linecap="round" class="path-line" />
                        </svg>
                    </div>

                    <div class="flex justify-between mt-10">
                        <div v-for="(res, idx) in results" :key="'res-'+idx" class="w-24 text-center">
                            <div
                                :class="['h-2 w-1 mx-auto mb-4 transition-colors duration-500', targetEndIdx === idx ? 'bg-indigo-500' : 'bg-slate-100']">
                            </div>
                            <div
                                :class="['p-3 rounded-2xl transition-all duration-700', 
                                         targetEndIdx === idx ? 'bg-indigo-600 text-white font-bold scale-110 shadow-xl' : 'bg-slate-50 text-slate-400 text-sm']">
                                {{ res || '???' }}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </transition>
    </div>

    <script>
        const { createApp, ref, computed, nextTick, watch } = Vue;

        createApp({
            setup() {
                // 数据定义
                const inputPlayer = ref('');
                const players = ref([
                    { id: 1, name: '玩家A' },
                    { id: 2, name: '玩家B' },
                    { id: 3, name: '玩家C' }
                ]);
                const results = ref(['火锅', '烧烤', '肯德基']);

                const showLadder = ref(false);
                const rungs = ref([]);
                const dragIdx = ref(null);

                // 动画相关
                const activeStartIdx = ref(null);
                const targetEndIdx = ref(null);
                const activePath = ref(null);

                // 配置参数
                const GAP = 120; // 间距
                const H_STEP = 60; // 层高
                const LEVELS = 10; // 层数

                const ladderWidth = computed(() => (players.value.length - 1) * GAP + 100);
                const ladderHeight = computed(() => LEVELS * H_STEP);

                // 同步结果数组长度与玩家数量
                watch(() => players.value.length, (newLen) => {
                    if (results.value.length < newLen) {
                        for (let i = results.value.length; i < newLen; i++) {
                            results.value.push(`结果 ${i + 1}`);
                        }
                    } else if (results.value.length > newLen) {
                        results.value.splice(newLen);
                    }
                }, { immediate: true });

                // --- 方法：编辑 ---
                const addPlayer = () => {
                    if (inputPlayer.value.trim()) {
                        players.value.push({ id: Date.now(), name: inputPlayer.value.trim() });
                        inputPlayer.value = '';
                        showLadder.value = false;
                    }
                };

                const removePlayer = (idx) => {
                    players.value.splice(idx, 1);
                    showLadder.value = false;
                };

                const handleDrop = (toIdx) => {
                    const item = players.value.splice(dragIdx.value, 1)[0];
                    players.value.splice(toIdx, 0, item);
                    showLadder.value = false;
                };

                // --- 方法：梯子生成 ---
                const getX = (idx) => idx * GAP + 50;
                const getY = (level) => level * H_STEP;

                const generateLadder = () => {
                    rungs.value = [];
                    activePath.value = null;
                    activeStartIdx.ref = null;
                    targetEndIdx.value = null;

                    // 随机生成梯子横杠逻辑
                    for (let l = 1; l < LEVELS; l++) {
                        for (let c = 0; c < players.value.length - 1; c++) {
                            if (Math.random() < 0.4) {
                                // 检查左侧是否已有横杠，避免三叉路口
                                const hasLeft = rungs.value.some(r => r.level === l && r.to === c);
                                if (!hasLeft) {
                                    rungs.value.push({ level: l, from: c, to: c + 1 });
                                }
                            }
                        }
                    }
                    showLadder.value = true;
                    // 平滑滚动到底部展示区
                    nextTick(() => {
                        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                    });
                };

                // --- 方法：运行动画 ---
                const startAnimation = (startIdx) => {
                    activeStartIdx.value = startIdx;
                    targetEndIdx.value = null;
                    activePath.value = null;

                    let currentCol = startIdx;
                    let pathData = `M ${getX(currentCol)} 0`;

                    // 模拟爬行轨迹
                    for (let l = 1; l <= LEVELS; l++) {
                        // 寻找当前层的横杠
                        const rung = rungs.value.find(r => r.level === l && (r.from === currentCol || r.to === currentCol));

                        // 先向下移动
                        pathData += ` L ${getX(currentCol)} ${getY(l)}`;

                        if (rung) {
                            // 向侧边移动
                            currentCol = (rung.from === currentCol) ? rung.to : rung.from;
                            pathData += ` L ${getX(currentCol)} ${getY(l)}`;
                        }
                    }

                    // 延伸到结果处
                    pathData += ` L ${getX(currentCol)} ${ladderHeight.value + 20}`;

                    // 触发渲染
                    nextTick(() => {
                        activePath.value = pathData;
                        // 动画持续 2s，结束后高亮结果
                        setTimeout(() => {
                            targetEndIdx.value = currentCol;
                        }, 1000);
                    });
                };

                return {
                    inputPlayer, players, results, showLadder, rungs,
                    ladderWidth, ladderHeight, dragIdx, activeStartIdx, targetEndIdx, activePath,
                    addPlayer, removePlayer, handleDrop, generateLadder, startAnimation, getX, getY
                };
            }
        }).mount('#app');
    </script>
</body>

</html>
