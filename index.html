<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

    <title>Scanner Pro Industrial</title>

    <script src="./assets/tailwindcss.js"></script>
    <script src="./assets/html5-qrcode.min.js"></script>
    <script src="./assets/vconsole.min.js"></script>
    <script>new window.VConsole()</script>

    <style>
        #reader {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            border: 4px solid white;
            touch-action: none;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none
        }

        .flash {
            animation: flash .35s
        }

        @keyframes flash {
            0% {
                background: rgba(59, 130, 246, .6)
            }

            100% {
                background: transparent
            }
        }
    </style>

</head>

<body class="bg-gray-100 h-screen flex flex-col font-sans">

    <header class="bg-white px-4 py-3 shadow flex justify-between items-center">

        <div>
            <h1 class="text-xl font-black text-blue-600">SCANNER PRO</h1>
            <p class="text-xs text-gray-400">Industrial Edition</p>
        </div>

        <button onclick="exportCSV()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm font-bold">
            导出 (<span id="count">0</span>)
        </button>

    </header>

    <section class="p-4 flex-shrink-0">

        <div class="relative">

            <div id="reader"></div>

            <div id="zoomUI" class="absolute top-3 right-3 bg-black/70 text-white text-xs px-2 py-1 rounded hidden">
                Zoom <span id="zoomVal">1</span>x
            </div>

            <div id="overlay" class="absolute inset-0 bg-black/80 flex items-center justify-center text-white">

                <button onclick="startScanner()" class="bg-blue-500 p-5 rounded-full shadow-xl animate-bounce">

                    ▶

                </button>

            </div>

        </div>

        <div class="flex gap-2 mt-3">

            <button onclick="toggleTorch()" class="flex-1 bg-white py-2 rounded border text-sm">
                🔦 补光灯
            </button>

            <button onclick="clearAll()" class="flex-1 bg-white py-2 rounded border text-sm text-red-500">
                清空
            </button>

        </div>

    </section>

    <main class="flex-1 overflow-y-auto px-4 pb-10 no-scrollbar">

        <div id="list" class="space-y-2"></div>

    </main>

    <audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>

        let scanner = null
        let history = []
        let historyHash = {}

        let currentZoom = 1
        let pinchStart = 0
        let torch = false

        const SCAN_DEBOUNCE = 300
        const PAUSE_TIME = 200

        let lastScan = 0

        /* ---------- 本地存储 ---------- */

        function saveLocal() {
            localStorage.setItem("scan_history_v2", JSON.stringify(history))
        }

        function loadLocal() {

            const d = localStorage.getItem("scan_history_v2")

            if (!d) return

            history = JSON.parse(d)

            history.forEach(v => historyHash[v.code] = 1)

            renderAll()

        }

        /* ---------- 获取摄像头 ---------- */

        function getTrack() {

            const v = document.querySelector("#reader video")

            if (!v || !v.srcObject) return null

            return v.srcObject.getVideoTracks()[0]

        }

        /* ---------- 启动扫描 ---------- */

        async function startScanner() {

            document.getElementById("overlay").style.display = "none"

            scanner = new Html5Qrcode("reader")

            await scanner.start(
                { facingMode: "environment" },
                {
                    fps: 30,
                    qrbox: (w, h) => ({ width: w * .7, height: h * .35 })
                },
                onScan
            )

            enableZoom()
            enableAutoFocus()

        }

        /* ---------- 自动对焦 ---------- */

        async function enableAutoFocus() {

            const track = getTrack()
            if (!track) return

            const cap = track.getCapabilities()

            if (!cap.focusMode) return

            if (cap.focusMode.includes("continuous")) {

                await track.applyConstraints({
                    advanced: [{ focusMode: "continuous" }]
                })

            } else if (cap.focusMode.includes("single-shot")) {

                setInterval(() => {

                    track.applyConstraints({
                        advanced: [{ focusMode: "single-shot" }]
                    })

                }, 2000)

            }

        }

        /* ---------- 扫码 ---------- */

        async function onScan(text) {

            const now = Date.now()

            if (now - lastScan < SCAN_DEBOUNCE) return

            lastScan = now

            if (historyHash[text]) return

            historyHash[text] = 1

            scanner.pause(true)

            addRecord(text)

            feedback()

            setTimeout(() => {
                scanner.resume()
            }, PAUSE_TIME)

        }

        /* ---------- 新记录 ---------- */

        function addRecord(code) {

            const item = {
                id: Date.now(),
                code,
                time: new Date().toLocaleTimeString()
            }

            history.unshift(item)

            prependDOM(item)

            updateCount()

            saveLocal()

        }

        /* ---------- DOM ---------- */

        function prependDOM(item) {

            const list = document.getElementById("list")

            const el = document.createElement("div")

            el.className = "bg-white p-3 rounded shadow flex justify-between items-center"

            el.innerHTML = `
<div class="flex-1 min-w-0">
<p class="font-mono font-bold truncate">${item.code}</p>
<p class="text-xs text-gray-400">${item.time}</p>
</div>

<div class="flex gap-2">

<button onclick="moveItem('${item.id}',-1)">⬆</button>
<button onclick="moveItem('${item.id}',1)">⬇</button>

<button onclick="removeItem('${item.id}')" class="text-red-400">删</button>

</div>
`

            list.prepend(el)

        }

        /* ---------- 重绘 ---------- */

        function renderAll() {

            const list = document.getElementById("list")

            list.innerHTML = ""

            const frag = document.createDocumentFragment()

            history.forEach(item => {

                const el = document.createElement("div")

                el.className = "bg-white p-3 rounded shadow flex justify-between items-center"

                el.innerHTML = `
<div class="flex-1 min-w-0">
<p class="font-mono font-bold truncate">${item.code}</p>
<p class="text-xs text-gray-400">${item.time}</p>
</div>

<div class="flex gap-2">

<button onclick="moveItem('${item.id}',-1)">⬆</button>
<button onclick="moveItem('${item.id}',1)">⬇</button>

<button onclick="removeItem('${item.id}')" class="text-red-400">删</button>

</div>
`

                frag.appendChild(el)

            })

            list.appendChild(frag)

            updateCount()

        }

        /* ---------- 删除 ---------- */

        function removeItem(id) {

            history = history.filter(v => v.id != id)

            saveLocal()

            renderAll()

        }

        /* ---------- 排序 ---------- */

        function moveItem(id, dir) {

            const i = history.findIndex(v => v.id == id)

            const ni = i + dir

            if (ni < 0 || ni >= history.length) return

            const t = history[i]

            history[i] = history[ni]

            history[ni] = t

            saveLocal()

            renderAll()

        }

        /* ---------- 清空 ---------- */

        function clearAll() {

            if (!confirm("确定清空?")) return

            history = []
            historyHash = {}

            localStorage.removeItem("scan_history_v2")

            renderAll()

        }

        /* ---------- 计数 ---------- */

        function updateCount() {

            document.getElementById("count").innerText = history.length

        }

        /* ---------- Torch ---------- */

        async function toggleTorch() {

            const track = getTrack()
            if (!track) return

            const cap = track.getCapabilities()

            if (!cap.torch) {
                alert("设备不支持")
                return
            }

            torch = !torch

            await track.applyConstraints({
                advanced: [{ torch }]
            })

        }

        /* ---------- Zoom ---------- */

        function enableZoom() {

            const container = document.getElementById("reader")

            container.addEventListener("touchstart", e => {

                if (e.touches.length == 2) {

                    pinchStart = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY)

                }

            }, { passive: false })

            container.addEventListener("touchmove", async e => {

                if (e.touches.length != 2) return

                e.preventDefault()

                const track = getTrack()
                if (!track) return

                const cap = track.getCapabilities()
                if (!cap.zoom) return

                const dist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY)

                let delta = (dist - pinchStart) / 200

                let next = currentZoom + delta

                next = Math.max(cap.zoom.min, Math.min(cap.zoom.max, next))

                await track.applyConstraints({
                    advanced: [{ zoom: next }]
                })

                currentZoom = next
                pinchStart = dist

                document.getElementById("zoomUI").classList.remove("hidden")
                document.getElementById("zoomVal").innerText = currentZoom.toFixed(1)

            }, { passive: false })

        }

        /* ---------- 反馈 ---------- */

        function feedback() {

            document.getElementById("beep").play().catch(() => { })

            if (navigator.vibrate) navigator.vibrate(30)

            const r = document.getElementById("reader")

            r.classList.add("flash")

            setTimeout(() => r.classList.remove("flash"), 300)

        }

        /* ---------- 导出 ---------- */

        function exportCSV() {

            if (!history.length) return alert("无数据")

            let csv = "\uFEFF序号,条码,时间\n"

            history.forEach((v, i) => {
                csv += `${i + 1},"${v.code}","${v.time}"\n`
            })

            const blob = new Blob([csv])

            const a = document.createElement("a")

            a.href = URL.createObjectURL(blob)

            a.download = "scan_export_" + Date.now() + ".csv"

            a.click()

        }

        /* ---------- 初始化 ---------- */

        window.onload = loadLocal

    </script>

</body>

</html>
